
##########################################
# CI Workflow for thunk
##########################################

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2

            - name: Check formatting
              run: cargo fmt --all -- --check
              
            - name: Run tests
              run: cargo test --all